name: Release

# Trusted publishing: pushing a vX.Y.Z tag builds the artifacts FROM THAT
# TAG'S TREE, verifies them behaviorally, and publishes to PyPI via OIDC
# (no tokens, no local dist/ — the stale-artifact class of release error
# is structurally impossible on this path).
#
# One-time PyPI setup: project Settings -> Publishing -> add a trusted
# publisher with owner/repo = this repository, workflow = release.yml,
# environment = pypi.
#
# release.sh remains the local pre-flight (`./release.sh --check`) and a
# manual fallback.

on:
  push:
    tags: ["v*"]

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify version coherence (tag == pyproject == __version__)
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PYPROJECT=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          MODULE=$(grep -m1 '__version__' triplet_extract/__init__.py | sed 's/.*"\(.*\)"/\1/')
          echo "tag=$TAG pyproject=$PYPROJECT __version__=$MODULE"
          test "$TAG" = "$PYPROJECT" && test "$TAG" = "$MODULE" \
            || { echo "version mismatch — tags are never re-pointed; bump instead"; exit 1; }

      - name: Install and test at the tag
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -e ".[dev]"
          python -m spacy download en_core_web_sm
          pytest tests/ -q

      - name: Build fresh artifacts
        run: |
          pip install build twine
          rm -rf dist
          python -m build
          twine check dist/*

      - name: Smoke-test the built wheel (clean venv)
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install -q --upgrade pip
          /tmp/smoke/bin/pip install -q --prefer-binary dist/*.whl
          /tmp/smoke/bin/python -m spacy download en_core_web_sm -q
          cd /tmp && /tmp/smoke/bin/python "$GITHUB_WORKSPACE/.github/workflows/smoke_probes.py" "${GITHUB_REF_NAME#v}"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: verify-and-build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
